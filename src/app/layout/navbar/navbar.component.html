<header class="navbar fixed top-0 left-0 right-0" style="text-align: -webkit-center" [ngClass]="{'navbar-hidden': !isNavbarVisible}">
  <div class="mx-5 mt-5">
    <p-menubar [model]="items">
      <ng-template #start>
        <img ngSrc="logo-nav.svg" alt="Logo" width="100" height="100">
      </ng-template>

      <ng-template #item let-item let-root="root">
        <a pRipple class="flex items-center p-menubar-item-link"
           [routerLink]="item.routerLink ? item.routerLink : null"
           (click)="item.numero ? null : navigateToSection($event, item.fragment)">
          @if (item.numero) {
            <a href="https://wa.me/{{item.numero}}">
              <div class="flex gap-5 flex-row items-center">
                <div class="pi pi-whatsapp p-4 rounded-full h-fit text-white" style="background-color: #627a93;"></div>
                <p style="font-size: 0.875rem">{{item.numeroEstilo}}</p>
              </div>
            </a>
          }
          <ng-container *ngIf="item.numero">

          </ng-container>
          @if (item.fragment) {
            <a [href]="item.fragment" class="p-button button-blue">¡CONSULTA AQUÍ!</a>
          }
          @if (!item.fragment && !item.numero) {
            <span style="color: #627a93">{{ item.label }}</span>
            @if (item.badge) {
              <p-badge [ngClass]="{ 'ml-auto': !root, 'ml-2': root }" [value]="item.badge"></p-badge>
            }
            @if (item.shortcut) {
              <span class="ml-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">{{ item.shortcut }}</span>
            }
            @if (item.items) {
              <i [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
            }
          }
        </a>
      </ng-template>
    </p-menubar>
  </div>
</header>

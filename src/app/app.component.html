
<div class="flex flex-col min-h-screen bg-white transition-all duration-500 overflow-hidden"
     [class.blur]="isLoading">

  @if (isBrowser) {
    <app-navbar></app-navbar>
    <main>
      <router-outlet></router-outlet>
    </main>
    <app-footer style="background-color: #101010"></app-footer>
  }

  <!-- Indicador de carga -->
  @if (isLoading) {
    <div style="background-color: #101010" class="loading-overlay">
      <div class="spinner"></div>
    </div>
  }
</div>
